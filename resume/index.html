<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Ellen Rose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css?v=1" />
  <link rel="stylesheet" href="../css/base.css?v=20" />
  <link rel="stylesheet" href="../css/case-study.css?v=5" />
  <link rel="stylesheet" href="../css/about.css?v=16" />
</head>
<body>

  <!-- PASSWORD GATE — shown until correct password ("knockknock") entered -->
  <div class="password-gate" id="passwordGate" role="dialog" aria-modal="true" aria-label="Password required">
    <form class="password-gate__form" id="passwordForm">
      <p class="password-gate__title">Password Protected</p>
      <p class="password-gate__note">This resume is available on request. Enter the password to continue, or write to me for access.</p>
      <label for="passwordInput" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Password</label>
      <input type="password" id="passwordInput" class="password-gate__input" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" class="password-gate__submit">Enter</button>
      <p class="password-gate__error" id="passwordError" aria-live="polite" hidden>Incorrect password. Try again.</p>
    </form>
  </div>

  <!-- NAV -->
  <nav class="site-nav" aria-label="Main navigation">
    <div class="container">
      <ul class="site-nav__list">
        <li><a href="/">About</a></li>
        <li><a href="/work/">Work</a></li>
        <li><a href="/play/">Play</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE -->
  <main class="about-page" id="resume">

    <!-- Two resume page images, centered and stacked.
         Add: assets/images/resume-1.png and resume-2.png -->
    <div class="resume-figures">
      <img src="../assets/images/resume-1.png" alt="Ellen Rose resume — page 1" onerror="this.style.display='none'" />
      <img src="../assets/images/resume-2.png" alt="Ellen Rose resume — page 2" onerror="this.style.display='none'" />
    </div>

    <!-- Back (left) / Work (right) pills, above the footer -->
    <div class="about-page-nav">
      <a class="footer-next" href="/">Back</a>
      <a class="footer-next" href="/work/">Work</a>
    </div>

    <!-- ── FOOTER ─────────────────────────────────────────────── -->
    <footer class="about-footer">
      <div class="footer-links">
        <a href="/resume/">Resume</a>
        <a href="https://www.linkedin.com/in/ellen-rose-05925620" target="_blank" rel="noopener">LinkedIn</a>
        <button
          aria-label="Copy email address"
          onclick="navigator.clipboard.writeText('ellenhrose@gmail.com').then(() => { this.textContent = 'Copied!'; setTimeout(() => this.textContent = 'Copy my email address and write to me →', 1500); })"
        >Copy my email address and write to me →</button>
        <span class="footer-credit">© Ellen Rose, 2026</span>
      </div>
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="../js/main.js" type="module"></script>
  <script src="../js/password-gate.js" type="module"></script>
</body>
</html>
