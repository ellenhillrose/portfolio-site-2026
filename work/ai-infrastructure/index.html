<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Infrastructure — Work — Ellen Rose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css?v=4" />
  <link rel="stylesheet" href="../../css/base.css?v=20" />
  <link rel="stylesheet" href="../../css/case-study.css?v=5" />
</head>
<body>

  <!-- PASSWORD GATE — shown until correct password ("knockknock") entered -->
  <div class="password-gate" id="passwordGate" role="dialog" aria-modal="true" aria-label="Password required">
    <form class="password-gate__form" id="passwordForm">
      <p class="password-gate__title">Password Protected</p>
      <p class="password-gate__note">This case study is protected under NDA. Enter the password to continue, or write to me for access.</p>
      <label for="passwordInput" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Password</label>
      <input type="password" id="passwordInput" class="password-gate__input" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" class="password-gate__submit">Enter</button>
      <p class="password-gate__error" id="passwordError" aria-live="polite" hidden>Incorrect password. Try again.</p>
    </form>
  </div>

  <!-- NAV -->
  <nav class="site-nav" aria-label="Main navigation">
    <div class="container">
      <ul class="site-nav__list">
        <li><a href="/">About</a></li>
        <li><a href="/work/" aria-current="page">Work</a></li>
        <li><a href="/play/">Play</a></li>
      </ul>
    </div>
  </nav>

  <main class="case-page" id="ai-infrastructure">

    <!-- Case study — embedded Google Slides deck (published to web), opening on slide 12 -->
    <div class="case-embed">
      <div class="case-embed__frame">
        <iframe
          src="https://docs.google.com/presentation/d/e/2PACX-1vRdn274ZA5EoDkNX8o9vDR53WPGwLlOv31tAJKBFJzXL-jOJPHboKMeNhC5IEqXH4phI05HCBUF1vG4/pubembed?start=false&amp;loop=false&amp;delayms=30000&amp;slide=12"
          title="CoreWeave case study deck (slides 12–18)"
          allow="fullscreen"
          allowfullscreen
          loading="lazy"></iframe>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="case-footer">
      <div class="case-footer__nav">
        <a href="/work/" class="footer-nav-pill">Back</a>
        <a href="/play/" class="footer-nav-pill">Play</a>
      </div>
      <div class="case-footer__links">
        <a href="/resume/">Resume</a>
        <a href="https://www.linkedin.com/in/ellen-rose-05925620" target="_blank" rel="noopener">LinkedIn</a>
        <button
          aria-label="Copy email address"
          onclick="navigator.clipboard.writeText('ellenhrose@gmail.com').then(() => { this.textContent = 'Copied!'; setTimeout(() => this.textContent = 'Copy my email address and write to me →', 1500); })"
        >Copy my email address and write to me →</button>
        <span class="footer-credit">© Ellen Rose, 2026</span>
      </div>
    </footer>

  </main>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="../../js/main.js" type="module"></script>
  <script src="../../js/password-gate.js" type="module"></script>
</body>
</html>
